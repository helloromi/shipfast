# CI : lint + typecheck + tests + build sur chaque push / PR.
# Le build utilise des variables factices : la validation d'env de next.config.ts
# exige leur présence, mais aucune n'est appelée pendant la compilation.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy
          STRIPE_SECRET_KEY: sk_test_ci_dummy
          STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
          RESEND_API_KEY: re_ci_dummy
          RESEND_FROM: CI <ci@example.com>
          CRON_SECRET: ci-dummy-secret
          NEXT_PUBLIC_SITE_URL: https://example.com
